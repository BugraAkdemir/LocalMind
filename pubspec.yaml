name: mobile_locallm
description: "A modern mobile client for local AI models via LM Studio API"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Routing
  go_router: ^14.8.1

  # UI & Rendering
  flutter_markdown: ^0.7.6
  flutter_highlight: ^0.7.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.3

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.3
  share_plus: ^10.1.4
  battery_plus: ^6.2.2
  device_info_plus: ^11.2.2
  porcupine_flutter: ^3.0.2
  flutter_foreground_task: ^7.2.1

  # Icons
  cupertino_icons: ^1.0.8
  permission_handler: ^12.0.1
  speech_to_text: ^7.3.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
